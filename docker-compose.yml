services:

  # ── Laravel PHP-FPM ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petmarket_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./src/storage:/var/www/storage   # persist storage across rebuilds
    environment:
      - PHP_OPCACHE_ENABLE=1
    networks:
      - petmarket_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: petmarket_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - petmarket_network
    depends_on:
      - app

  # ── PostgreSQL 17 ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: petmarket_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pet_marketplace
      POSTGRES_USER: petmarket
      POSTGRES_PASSWORD: petmarket123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - petmarket_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petmarket -d pet_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: petmarket_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petmarket.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - petmarket_network
    depends_on:
      - postgres

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: petmarket_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules              # anonymous volume prevents host override
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_APP_NAME=Pet Marketplace
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && npm run dev"
    networks:
      - petmarket_network
    depends_on:
      - app

  # ── FastAPI AI Service ───────────────────────────────────────────────────────
  ai_service:
    image: python:3.11-slim
    container_name: petmarket_ai_service
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ai-service:/app
      - ai_venv:/opt/venv
      - ai_pip_cache:/root/.cache/pip
    ports:
      - "8001:8001"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    command: sh -c "if [ ! -x /opt/venv/bin/python ]; then python -m venv /opt/venv; fi && . /opt/venv/bin/activate && if [ ! -f /opt/venv/.req_installed ] || [ requirements.txt -nt /opt/venv/.req_installed ]; then pip install -r requirements.txt && touch /opt/venv/.req_installed; fi && uvicorn main:app --host 0.0.0.0 --port 8001"
    networks:
      - petmarket_network
    depends_on:
      - postgres

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  ai_venv:
    driver: local
  ai_pip_cache:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  petmarket_network:
    driver: bridge
